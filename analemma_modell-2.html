<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analemma — Parametermodell</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg:#0a0e1a;
    --panel:#121726;
    --panel-border:#232b40;
    --text:#e8ecf4;
    --text-dim:#8b93a7;
    --gold:#f2a341;
    --blue:#4f8ff7;
    --red:#e35d5d;
    --green:#5ec98f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, rgba(79,143,247,0.10), transparent 55%),
      radial-gradient(ellipse at 90% 10%, rgba(242,163,65,0.07), transparent 50%),
      var(--bg);
    color:var(--text);
    font-family:'Space Grotesk', system-ui, sans-serif;
    padding:20px 14px 50px;
  }
  .wrap{max-width:740px;margin:0 auto;}
  h1{font-size:22px;font-weight:700;margin:4px 0 2px;letter-spacing:0.2px;}
  .sub{color:var(--text-dim);font-size:13.5px;margin:0 0 20px;line-height:1.5;}
  .card{
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:12px;
    padding:16px;
    margin-bottom:14px;
  }
  .plot-card{padding:12px;position:relative;}
  .canvas-wrap{position:relative;width:100%;aspect-ratio:760/600;}
  canvas{position:absolute;inset:0;width:100%;height:100%;}
  #plotDynamic{pointer-events:none;}
  .datebadge{
    position:absolute;top:20px;right:20px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;color:var(--gold);
    background:rgba(10,14,26,0.7);
    border:1px solid rgba(242,163,65,0.35);
    border-radius:6px;padding:4px 9px;
    letter-spacing:0.3px;
  }
  .slider-row{margin-bottom:14px;}
  .slider-row:last-child{margin-bottom:0;}
  .slider-row label{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:13.5px;color:var(--text);margin-bottom:6px;
  }
  .slider-row.secondary label{color:var(--text-dim);}
  .slider-row label small{color:var(--text-dim);font-weight:400;margin-left:6px;}
  .mono{font-family:'JetBrains Mono',monospace;color:var(--gold);font-size:13px;}
  .secondary .mono{color:var(--blue);}
  input[type=range]{
    width:100%;height:4px;border-radius:2px;
    background:var(--panel-border);
    -webkit-appearance:none;appearance:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:var(--gold);cursor:pointer;border:2px solid #0a0e1a;
  }
  .secondary input[type=range]::-webkit-slider-thumb{background:var(--blue);}
  input[type=range]::-moz-range-thumb{
    width:16px;height:16px;border-radius:50%;background:var(--gold);
    cursor:pointer;border:2px solid #0a0e1a;
  }
  .preset-group{margin-top:16px;}
  .preset-label{font-size:11px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-dim);margin-bottom:8px;}
  .presets{display:flex;flex-wrap:wrap;gap:8px;}
  button{
    background:#1a2135;border:1px solid var(--panel-border);color:var(--text);
    font-family:inherit;font-size:12.5px;padding:7px 12px;border-radius:7px;
    cursor:pointer;transition:border-color .15s, background .15s;
  }
  button:hover{border-color:var(--gold);background:#212a42;}
  .checkbox{
    display:flex;align-items:center;gap:8px;margin-top:16px;
    font-size:13px;color:var(--text-dim);cursor:pointer;
  }
  .stats{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:2;color:var(--text-dim);}
  .stats b{color:var(--text);font-weight:500;}
  .stats .row{display:flex;justify-content:space-between;border-bottom:1px dashed var(--panel-border);padding:2px 0;}
  .stats .row:last-child{border-bottom:none;}
  .legend{font-size:11.5px;color:var(--text-dim);margin-top:10px;line-height:1.6;}
  .legend span{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:-1px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Analemma — Parametermodell</h1>
  <p class="sub">Wirkung von Bahnexzentrizität <span class="mono" style="color:var(--gold)">e</span>, Achsneigung <span class="mono" style="color:var(--gold)">ε</span> und Periheldrehung <span class="mono" style="color:var(--blue)">ϖ</span> auf die Analemma-Kurve — exakte Kepler-Lösung, keine Reihenentwicklung.</p>

  <div class="card plot-card">
    <div class="canvas-wrap">
      <canvas id="plotStatic" width="760" height="600"></canvas>
      <canvas id="plotDynamic" width="760" height="600"></canvas>
    </div>
    <div class="datebadge" id="dateBadge">—</div>
  </div>

  <div class="card">
    <div class="slider-row">
      <label>Exzentrizität e <span id="eVal" class="mono"></span></label>
      <input type="range" id="eSlider" min="0" max="0.5" step="0.0001" value="0.0167">
    </div>
    <div class="slider-row">
      <label>Achsneigung ε <span id="epsVal" class="mono"></span></label>
      <input type="range" id="epsSlider" min="0" max="180" step="0.01" value="23.44">
    </div>
    <div class="slider-row secondary">
      <label>Periheldrehung ϖ <span id="varpiVal" class="mono"></span><small>steuert die Asymmetrie</small></label>
      <input type="range" id="varpiSlider" min="0" max="360" step="0.1" value="282.94">
    </div>

    <div class="preset-group">
      <div class="preset-label">Planeten</div>
      <div class="presets">
        <button data-preset="merkur">Merkur</button>
        <button data-preset="venus">Venus</button>
        <button data-preset="erde">Erde</button>
        <button data-preset="mars">Mars</button>
        <button data-preset="jupiter">Jupiter</button>
        <button data-preset="saturn">Saturn</button>
        <button data-preset="uranus">Uranus</button>
        <button data-preset="neptun">Neptun</button>
      </div>
    </div>
    <div class="preset-group">
      <div class="preset-label">Grenzfälle</div>
      <div class="presets">
        <button data-preset="kreis">Kreisbahn</button>
        <button data-preset="senkrecht">ε = 0</button>
        <button data-preset="symm">Perihel = Solstitium</button>
        <button data-preset="equinox">Perihel = Äquinoktium</button>
        <button data-preset="extrem">Extremfall</button>
      </div>
    </div>

    <label class="checkbox">
      <input type="checkbox" id="showComponents">
      Grenzfälle als Referenz einblenden (reine Exzentrizität / reine Schiefe)
    </label>

    <div class="legend">
      <span style="background:var(--gold)"></span>aktuelle Kurve
      &nbsp;&nbsp;<span style="background:var(--blue)"></span>Kardinalpunkte
      &nbsp;&nbsp;<span style="background:var(--red)"></span>Referenz: nur ε (e=0)
      &nbsp;&nbsp;<span style="background:var(--green)"></span>Referenz: nur e (ε=0)
    </div>
  </div>

  <div class="card stats" id="stats"></div>
</div>

<script>
// ---------- Astronomie ----------
const toRad = d => d*Math.PI/180;
const toDeg = r => r*180/Math.PI;
const wrap360 = d => ((d%360)+360)%360;
const wrap180 = d => wrap360(d+180)-180;

function solveKepler(Mrad, e){
  let E = Mrad;
  for(let i=0;i<60;i++){
    const f = E - e*Math.sin(E) - Mrad;
    const fp = 1 - e*Math.cos(E);
    const dE = f/fp;
    E -= dE;
    if(Math.abs(dE) < 1e-13) break;
  }
  return E;
}

// exakte Lösung (Kepler + sphärisches Dreieck), keine Reihenentwicklung
function pointFromM(Mdeg, e, epsDeg, varpiDeg){
  const Mrad = toRad(wrap360(Mdeg));
  const E = solveKepler(Mrad, e);
  const nu = 2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2), Math.sqrt(1-e)*Math.cos(E/2));
  const lambda = wrap360(toDeg(nu) + varpiDeg);
  const lamRad = toRad(lambda);
  const eps = toRad(epsDeg);
  const delta = Math.asin(Math.sin(eps)*Math.sin(lamRad));
  const alpha = Math.atan2(Math.cos(eps)*Math.sin(lamRad), Math.cos(lamRad));
  // Bei retrograder Rotation (eps>90°, cos eps<0) läuft die wahre Rektaszension
  // rückläufig zu λ. Die "mittlere Sonne" muss denselben Wickelsinn haben, sonst
  // ist EoT = L0-α keine beschränkte Korrektur mehr, sondern driftet unbegrenzt.
  const retro = Math.cos(eps) < 0;
  const L0 = retro ? (varpiDeg - Mdeg) : (Mdeg + varpiDeg);
  const eotDeg = wrap180(L0 - toDeg(alpha));
  return { M: wrap360(Mdeg), eot: eotDeg*4, delta: toDeg(delta) };
}

function buildCurve(e, epsDeg, varpiDeg, n=366){
  const pts = [];
  for(let i=0;i<=n;i++) pts.push(pointFromM(i*360/n, e, epsDeg, varpiDeg));
  unwrapEot(pts);
  return pts;
}

// Für cos(eps) < 0 (eps > 90°) läuft α gegenläufig zu L0 -> die rohe Differenz
// überschreitet ±180°, wrap180() würde in pointFromM() harte Sprünge erzeugen.
// Hier wird die bereits gewrappte Folge nachträglich kontinuierlich gemacht
// (Standard-"Phase Unwrap", Periode 1440 min = 360°).
function unwrapEot(pts){
  for(let i=1;i<pts.length;i++){
    let diff = pts[i].eot - pts[i-1].eot;
    while(diff > 720){ pts[i].eot -= 1440; diff -= 1440; }
    while(diff < -720){ pts[i].eot += 1440; diff += 1440; }
  }
  return pts;
}

// Kalender ist an der mittleren Länge L0 kalibriert (Frühlingsäquinoktium bei Tag 79),
// unabhängig vom Rotationssinn -- die Orbitzeit läuft immer "vorwärts".
function dayToM(day, varpiDeg){ return wrap360((day-79)*360/365.25 - varpiDeg); }
function MtoDay(Mdeg, varpiDeg){ return 79 + (Mdeg+varpiDeg)*365.25/360; }
function periDay(varpiDeg){ return MtoDay(0, varpiDeg); }

const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const CARDINAL = [
  {day:79,  label:'Frühling'},
  {day:172, label:'Sommer'},
  {day:266, label:'Herbst'},
  {day:355, label:'Winter'}
];

function dayOfYearToLabel(day){
  day = ((Math.round(day)-1)%365+365)%365+1;
  const cum = [0,31,59,90,120,151,181,212,243,273,304,334,365];
  let m=0; while(m<11 && day>cum[m+1]) m++;
  const d = day - cum[m];
  return `${d}. ${MONTHS[m]}`;
}

// ---------- Presets ----------
// e, Achsneigung: NASA Planetary Fact Sheet. ϖ hier als (heliozentrische Periheldrehung + 180°)
// verwendet -- das geozentrische Analogon, mit dem auch der Erd-Defaultwert (282,94°) konsistent ist.
const PRESETS = {
  merkur:    {e:0.2056, eps:0.03,   varpi:257.46, name:'Merkur'},
  venus:     {e:0.0068, eps:177.36, varpi:311.60, name:'Venus (retrograd)'},
  erde:      {e:0.0167, eps:23.44,  varpi:282.94, name:'Erde'},
  mars:      {e:0.0935, eps:25.19,  varpi:156.04, name:'Mars'},
  jupiter:   {e:0.0489, eps:3.13,   varpi:194.73, name:'Jupiter'},
  saturn:    {e:0.0565, eps:26.73,  varpi:272.60, name:'Saturn'},
  uranus:    {e:0.0457, eps:97.77,  varpi:350.95, name:'Uranus (Seitenlage)'},
  neptun:    {e:0.0113, eps:28.32,  varpi:224.96, name:'Neptun'},
  kreis:     {e:0,      eps:23.44,  varpi:282.94, name:'Kreisbahn'},
  senkrecht: {e:0.0167, eps:0,      varpi:282.94, name:'ε = 0'},
  symm:      {e:0.0167, eps:23.44,  varpi:270,    name:'Solstitium (Schleifen je selbstsymmetrisch)'},
  equinox:   {e:0.0167, eps:23.44,  varpi:0,      name:'Äquinoktium (Schleifen gleich groß)'},
  extrem:    {e:0.4,    eps:45,     varpi:282.94, name:'Extremfall'}
};

// ---------- UI-Referenzen ----------
const eSlider = document.getElementById('eSlider');
const epsSlider = document.getElementById('epsSlider');
const varpiSlider = document.getElementById('varpiSlider');
const eVal = document.getElementById('eVal');
const epsVal = document.getElementById('epsVal');
const varpiVal = document.getElementById('varpiVal');
const showComponents = document.getElementById('showComponents');
const statsEl = document.getElementById('stats');
const dateBadge = document.getElementById('dateBadge');

const staticCv = document.getElementById('plotStatic');
const sctx = staticCv.getContext('2d');
const dynCv = document.getElementById('plotDynamic');
const dctx = dynCv.getContext('2d');

const M = {left:64, right:24, top:24, bottom:54};
const W = staticCv.width, H = staticCv.height;
const plotW = W - M.left - M.right;
const plotH = H - M.top - M.bottom;

let rangeX = 20, rangeY = 30; // wird bei jedem Redraw aktualisiert
let currentBody = 'Erde';
let currentPts = [];
let currentVarpi = 282.94;
const N_SAMPLES = 366;

function niceCeil(x, step){ return Math.ceil(x/step)*step; }

function px(eot, delta){
  return {
    x: M.left + (eot + rangeX)/(2*rangeX) * plotW,
    y: M.top + (rangeY - delta)/(2*rangeY) * plotH
  };
}

function drawAxes(){
  sctx.strokeStyle = '#1c2438';
  sctx.fillStyle = '#8b93a7';
  sctx.font = '11px JetBrains Mono, monospace';
  sctx.lineWidth = 1;

  const xt = [-rangeX, -rangeX/2, 0, rangeX/2, rangeX];
  const yt = [-rangeY, -rangeY/2, 0, rangeY/2, rangeY];

  xt.forEach(v=>{
    const p = px(v,0);
    sctx.beginPath(); sctx.moveTo(p.x, M.top); sctx.lineTo(p.x, M.top+plotH); sctx.stroke();
    sctx.textAlign='center';
    sctx.fillText(v.toFixed(v%1===0?0:1), p.x, M.top+plotH+18);
  });
  yt.forEach(v=>{
    const p = px(0,v);
    sctx.beginPath(); sctx.moveTo(M.left, p.y); sctx.lineTo(M.left+plotW, p.y); sctx.stroke();
    sctx.textAlign='right';
    sctx.fillText(v.toFixed(v%1===0?0:1)+'°', M.left-8, p.y+4);
  });

  // Nullachsen betont
  sctx.strokeStyle = '#3a4560';
  sctx.lineWidth = 1.3;
  const zx = px(0,0);
  sctx.beginPath(); sctx.moveTo(zx.x, M.top); sctx.lineTo(zx.x, M.top+plotH); sctx.stroke();
  sctx.beginPath(); sctx.moveTo(M.left, zx.y); sctx.lineTo(M.left+plotW, zx.y); sctx.stroke();

  sctx.textAlign='center';
  sctx.fillStyle='#8b93a7';
  sctx.font='12px Space Grotesk, sans-serif';
  sctx.fillText('Zeitgleichung EoT [min]', M.left+plotW/2, H-8);
  sctx.save();
  sctx.translate(16, M.top+plotH/2);
  sctx.rotate(-Math.PI/2);
  sctx.fillText('Deklination δ [°]', 0, 0);
  sctx.restore();
}

function drawCurve(ctx, pts, color, width, glow, dash){
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.setLineDash(dash || []);
  if(glow){ ctx.shadowColor = color; ctx.shadowBlur = 10; }
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const c = px(p.eot, p.delta);
    if(i===0) ctx.moveTo(c.x,c.y); else ctx.lineTo(c.x,c.y);
  });
  ctx.stroke();
  ctx.restore();
}

function redraw(){
  const e = parseFloat(eSlider.value);
  const eps = parseFloat(epsSlider.value);
  const varpi = parseFloat(varpiSlider.value);

  eVal.textContent = e.toFixed(4);
  epsVal.textContent = eps.toFixed(2)+'°';
  varpiVal.textContent = varpi.toFixed(1)+'° · Perihel: '+dayOfYearToLabel(periDay(varpi));
  currentVarpi = varpi;

  const pts = buildCurve(e, eps, varpi, N_SAMPLES);
  currentPts = pts;
  const maxEot = Math.max(...pts.map(p=>Math.abs(p.eot)));
  const maxDelta = Math.max(...pts.map(p=>Math.abs(p.delta)));
  rangeX = niceCeil(Math.max(maxEot*1.25, 5), 5);
  rangeY = niceCeil(Math.max(maxDelta*1.25, 5), 5);

  sctx.clearRect(0,0,W,H);
  drawAxes();

  if(showComponents.checked){
    const onlyE = buildCurve(e, 0, varpi, N_SAMPLES);      // reine Exzentrizität -> Linie
    const onlyEps = buildCurve(0, eps, varpi, N_SAMPLES);  // reine Schiefe -> symmetrische 8
    drawCurve(sctx, onlyE, '#5ec98f', 1.6, false, [4,4]);
    drawCurve(sctx, onlyEps, '#e35d5d', 1.6, false, [4,4]);
  }

  drawCurve(sctx, pts, '#f2a341', 2.6, true);

  // Kardinalpunkte: aus derselben unwrapped Kurve lesen (nicht unabhängig neu berechnen),
  // sonst liegen die Marker um ein Vielfaches von 1440min neben der Kurve.
  sctx.fillStyle = '#4f8ff7';
  sctx.font = '11px Space Grotesk, sans-serif';
  CARDINAL.forEach(c=>{
    const idx = Math.round(wrap360(dayToM(c.day, varpi))/360*N_SAMPLES);
    const pt = pts[idx];
    const p = px(pt.eot, pt.delta);
    sctx.beginPath(); sctx.arc(p.x,p.y,4,0,7); sctx.fill();
    sctx.fillText(c.label, p.x+8, p.y-6);
  });

  // Stats
  let maxP = pts[0], minP = pts[0];
  pts.forEach(p=>{ if(p.eot>maxP.eot) maxP=p; if(p.eot<minP.eot) minP=p; });
  const dayMax = MtoDay(maxP.M, varpi);
  const dayMin = MtoDay(minP.M, varpi);

  const upperPts = pts.filter(p=>p.delta>0);
  const lowerPts = pts.filter(p=>p.delta<0);
  let loopRatioTxt = '—';
  if(upperPts.length && lowerPts.length){
    const upW = Math.max(...upperPts.map(p=>p.eot)) - Math.min(...upperPts.map(p=>p.eot));
    const lowW = Math.max(...lowerPts.map(p=>p.eot)) - Math.min(...lowerPts.map(p=>p.eot));
    loopRatioTxt = `${upW.toFixed(1)} : ${lowW.toFixed(1)}  (${(upW/lowW).toFixed(2)})`;
  }

  statsEl.innerHTML = `
    <div class="row"><span>Körper</span><b>${currentBody}</b></div>
    <div class="row"><span>Schleifen ob./unt.</span><b>${loopRatioTxt}</b></div>
    <div class="row"><span>EoT Maximum</span><b>+${maxP.eot.toFixed(1)} min (${dayOfYearToLabel(dayMax)})</b></div>
    <div class="row"><span>EoT Minimum</span><b>${minP.eot.toFixed(1)} min (${dayOfYearToLabel(dayMin)})</b></div>
    <div class="row"><span>δ-Bereich</span><b>±${eps.toFixed(2)}°</b></div>
    <div class="row"><span>Parameter</span><b>e=${e.toFixed(4)}, ε=${eps.toFixed(2)}°, ϖ=${varpi.toFixed(1)}°</b></div>
    ${eps>90 ? `<div class="row" style="color:#4f8ff7"><span>Hinweis</span><b>ε&gt;90° (retrograd): mittlere Sonne läuft im selben Wickelsinn wie α mit — Kurve bleibt geschlossen</b></div>` : ''}
  `;
}

// ---------- Animation: laufende Sonne ----------
let t0 = performance.now();
const PERIOD_MS = 9000;

function animate(now){
  if(currentPts.length < 2){ requestAnimationFrame(animate); return; }

  let dt = now - t0;
  if(dt < 0) dt = 0; // erster rAF-Tick kann durch Timer-Quantisierung minimal vor t0 liegen
  const phase = (dt % PERIOD_MS) / PERIOD_MS;
  const idxF = phase*N_SAMPLES;
  const last = currentPts.length - 1;
  const i0 = Math.max(0, Math.min(Math.floor(idxF), last));
  const i1 = Math.min(i0+1, last);
  const f = idxF - i0;
  const a = currentPts[i0], b = currentPts[i1];
  const eot = a.eot + (b.eot-a.eot)*f;
  const delta = a.delta + (b.delta-a.delta)*f;
  const p = px(eot, delta);
  const Mdeg = phase*360;
  const day = MtoDay(Mdeg, currentVarpi);

  dctx.clearRect(0,0,W,H);
  dctx.save();
  dctx.shadowColor = '#f2a341';
  dctx.shadowBlur = 18;
  dctx.fillStyle = '#fff3e0';
  dctx.beginPath(); dctx.arc(p.x, p.y, 5.5, 0, 7); dctx.fill();
  dctx.restore();

  dateBadge.textContent = dayOfYearToLabel(day);

  requestAnimationFrame(animate);
}

// ---------- Events ----------
[eSlider, epsSlider, varpiSlider].forEach(el=>{
  el.addEventListener('input', ()=>{ currentBody = 'angepasst'; redraw(); });
});
showComponents.addEventListener('input', redraw);

document.querySelectorAll('[data-preset]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const p = PRESETS[btn.dataset.preset];
    eSlider.value = p.e;
    epsSlider.value = p.eps;
    varpiSlider.value = p.varpi;
    currentBody = p.name;
    redraw();
  });
});

redraw();
requestAnimationFrame(animate);
</script>
</body>
</html>
